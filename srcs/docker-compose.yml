services:
  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    depends_on:
      - wordpress
    restart: unless-stopped

  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress
    container_name: wordpress
    env_file:
      - ../.env
    environment:
      - DB_HOST=${DB_HOST:-mariadb}
      - DB_USER=${DB_USER:-wp_user}
      - DB_PASSWORD=${DB_PASSWORD:-wp_pass}
      - DB_NAME=${DB_NAME:-wp_db}
      - WP_ADMIN_USER=${WP_ADMIN_USER:-admin}
      - WP_ADMIN_PASSWORD=${WP_ADMIN_PASSWORD:-admin123}
      - WP_ADMIN_EMAIL=${WP_ADMIN_EMAIL:-admin@example.com}
      - WP_TITLE=${WP_TITLE:-MyWordPress}
      - WP_URL=${WP_URL:-http://localhost}
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    depends_on:
      - mariadb
    restart: unless-stopped

  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: mariadb
    container_name: mariadb
    env_file:
      - ../.env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_pass}
      - MYSQL_DATABASE=${DB_NAME:-wp_db}
      - MYSQL_USER=${DB_USER:-wp_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-wp_pass}
    volumes:
      - mariadb:/var/lib/mysql
    networks:
      - inception
    restart: unless-stopped

volumes:
  wordpress:
    driver: local
  mariadb:
    driver: local

networks:
  inception:
    driver: bridge